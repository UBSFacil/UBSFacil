<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site Completo</title>

    <!-- CSS (estilo do site) -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <h1>Meu Site</h1>
        <p>Aprendendo HTML, CSS e JavaScript</p>
    </header>

    <!-- Menu -->
    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </nav>

    <!-- Conteúdo -->
    <div class="container">
        <h2>Conteúdo principal</h2>
        <p>Clique no botão para ver JavaScript funcionando:</p>

        <button onclick="mostrarMensagem()">Clique aqui</button>

        <p id="mensagem"></p>
    </div>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 Meu Site</p>
    </footer>

    <!-- JavaScript (interatividade) -->
    <script>
        function mostrarMensagem() {
            document.getElementById("mensagem").innerText = "Você clicou no botão!";
        }
    </script>

</body>
</html>
