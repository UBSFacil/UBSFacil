<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Cabeçalho do site (não aparece diretamente na página) -->
    <meta charset="UTF-8">
    <title>Meu Primeiro Site</title>
</head>
<body>
    <!-- Tudo que aparece para o usuário fica dentro do <body> -->

    <h1>Bem-vindo ao meu site</h1>
    <p>Este é um exemplo básico de como um site funciona.</p>

    <!-- Link para outra página -->
    <a href="https://www.google.com">Ir para o Google</a>

    <!-- Imagem -->
    <img src="https://via.placeholder.com/150" alt="Imagem de exemplo">

    <!-- Lista -->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

</body>
</html>
